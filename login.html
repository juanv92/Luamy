<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Luamy Taller</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #f8f9fa; 
            padding: 20px; 
        }
        .login-box { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); 
        }
        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
        }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
        }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            background-color: #333; 
            color: white; 
        }
        .btn-login:disabled { 
            opacity: 0.7; 
        }
        .back-link { 
            display: block; 
            margin-top: 25px; 
            color: #777; 
            text-decoration: none; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <section class="login-container">
        <article class="login-box">
            <img src="logo2.jpeg" alt="Luamy" style="height: 70px; margin-bottom: 15px; border-radius: 5px;">
            <h2>Panel de Control</h2>
            <form id="loginForm">
                <article class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="admin@luamy.com">
                </article>
                <article class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </article>
                <button type="submit" class="btn-login" id="submitBtn">Ingresar</button>
            </form>
            <p id="error-msg" style="color: #e74c3c; display: none; margin-top: 15px; font-weight: 600;"></p>
            <a href="index.html" class="back-link">← Volver al inicio</a>
        </article>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIGURACIÓN
        const supabaseUrl = 'https://TU_PROYECTO_ID.supabase.co';
        const supabaseKey = 'TU_ANON_KEY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = "none";
            submitBtn.innerText = "Verificando...";
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.innerText = "Error: " + error.message;
                errorMsg.style.display = "block";
                submitBtn.innerText = "Ingresar";
                submitBtn.disabled = false;
            } else {
                // Supabase guarda la sesión automáticamente en LocalStorage
                window.location.href = "dashboard.html";
            }
        });

        // Si ya está logueado, mandarlo al dashboard directamente
        async function checkSession() {
            const { data } = await supabase.auth.getSession();
            if (data.session) window.location.href = "dashboard.html";
        }
        checkSession();
    </script>
</body>
</html>
