<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Luamy Taller</title>

    <link rel="stylesheet" href="style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f8f9fa;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .login-box img {
            height: 70px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .login-box h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 15px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #333;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #333;
            color: white;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #111;
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: #777;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #000;
        }

        .error-msg {
            color: #e74c3c;
            display: none;
            margin-top: 15px;
            font-weight: 600;
            font-size: 14px;
        }

        .success-msg {
            color: #27ae60;
            display: none;
            margin-top: 15px;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <section class="login-container">

        <article class="login-box">

            <img src="logo2.jpeg" alt="Luamy">

            <h2>Panel de Control</h2>

            <form id="loginForm">

                <article class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        required 
                        placeholder="Correo@luamy.com"
                        autocomplete="email"
                    >
                </article>

                <article class="input-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                </article>

                <button type="submit" class="btn-login" id="submitBtn">
                    Ingresar
                </button>

            </form>

            <p id="error-msg" class="error-msg"></p>
            <p id="success-msg" class="success-msg"></p>

            <a href="index.html" class="back-link">
                ← Volver al inicio
            </a>

        </article>

    </section>

    <!-- SUPABASE -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>

        // =========================
        // CONFIGURACIÓN SUPABASE
        // =========================

        const supabaseUrl = 'https://cjgsxkqlslemhbyhdfll.supabase.co';

        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqZ3N4a3Fsc2xlbWhieWhkZmxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTIwMzEsImV4cCI6MjA5Mjk2ODAzMX0.VRC0Xn3R94WFZKY0vUW6G9TXCzsoO0Y-2LjFAbEQZYQ';

        const supabaseClient = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        );

        // =========================
        // ELEMENTOS HTML
        // =========================

        const loginForm = document.getElementById('loginForm');

        const errorMsg = document.getElementById('error-msg');

        const successMsg = document.getElementById('success-msg');

        const submitBtn = document.getElementById('submitBtn');

        // =========================
        // LOGIN
        // =========================

        loginForm.addEventListener('submit', async (e) => {

            e.preventDefault();

            // Limpiar mensajes
            errorMsg.style.display = "none";
            successMsg.style.display = "none";

            // Estado botón
            submitBtn.innerText = "Verificando...";
            submitBtn.disabled = true;

            // Obtener valores
            const email = document.getElementById('email').value.trim();

            const password = document.getElementById('password').value.trim();

            try {

                console.log("Intentando login...");

                // LOGIN SUPABASE
                const { data, error } =
                    await supabaseClient.auth.signInWithPassword({
                        email,
                        password
                    });

                // DEBUG
                console.log("Respuesta login:", data);

                // ERROR
                if (error) {
                    throw error;
                }

                // LOGIN EXITOSO
                successMsg.innerText = "Ingreso exitoso...";
                successMsg.style.display = "block";

                console.log("LOGIN EXITOSO");

                // Esperar un poco antes de redireccionar
                setTimeout(() => {

                    window.location.href = "./dashboard.html";

                }, 700);

            } catch (error) {

                console.error("ERROR LOGIN:", error);

                errorMsg.innerText = error.message;

                errorMsg.style.display = "block";

                submitBtn.innerText = "Ingresar";

                submitBtn.disabled = false;
            }

        });

        // =========================
        // VALIDAR SESIÓN ACTIVA
        // =========================

        async function checkSession() {

            try {

                const { data, error } =
                    await supabaseClient.auth.getSession();

                console.log("Sesión actual:", data);

                if (error) {
                    console.error(error);
                    return;
                }

                // Si ya existe sesión
                if (data.session) {

                    console.log("Usuario ya autenticado");

                    window.location.href = "./dashboard.html";
                }

            } catch (error) {

                console.error("ERROR SESSION:", error);

            }

        }

        checkSession();

    </script>

</body>

</html>
