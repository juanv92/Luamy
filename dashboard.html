<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Luamy Taller</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #f4f4f4; 
        }
        .admin-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 5%; 
            background: white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .dashboard-container { 
            padding: 30px 5%; 
            max-width: 1100px; 
            margin: 0 auto; 
        }
        .form-add-product { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
        }
        .form-group-inline { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
            margin-bottom: 15px; 
        }
        input, select { 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            flex: 1; 
            min-width: 150px; 
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        .product-card { 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
        }
        .product-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 5px; 
        }
        .btn-danger { 
            background: #e74c3c; 
            color: white; 
            border: none; 
            padding: 8px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 5px; 
            margin-top: 10px; 
        }
        .btn-primary { 
            background: #333; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px; 
        }
        #upload-status { 
            color: blue; 
            display: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <img src="logo2.jpeg" alt="Luamy" style="height: 50px;">
        <button onclick="cerrarSesion()" class="btn-primary">Cerrar Sesión</button>
    </nav>

    <article class="dashboard-container">
        <article class="form-add-product">
            <h3>Nueva Prenda</h3>
            <form id="productForm">
                <article class="form-group-inline">
                    <input type="text" id="prodName" placeholder="Nombre" required>
                    <input type="number" id="prodPrice" placeholder="Precio COP" required>
                    <select id="prodCategory" required>
                        <option value="">Categoría...</option>
                        <option value="conjuntos">Conjuntos</option>
                        <option value="faldas">Faldas</option>
                        <option value="novias">Novias</option>
                    </select>
                </article>
                <article class="form-group-inline">
                    <input type="file" id="prodImage" accept="image/*" required>
                    <button type="submit" id="uploadBtn" class="btn-primary">Subir Producto</button>
                </article>
                <p id="upload-status">Subiendo, por favor espera...</p>
            </form>
        </article>

        <h3>Inventario</h3>
        <article class="grid-container" id="admin-grid"></article>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://TU_PROYECTO_ID.supabase.co';
        const supabaseKey = 'TU_ANON_KEY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const adminGrid = document.getElementById('admin-grid');
        const productForm = document.getElementById('productForm');

        // 1. Proteger ruta
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                fetchProducts();
            }
        }

        // 2. Cerrar sesión
        async function cerrarSesion() {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        }

        // 3. Cargar productos
        async function fetchProducts() {
            adminGrid.innerHTML = '<p>Cargando...</p>';
            const { data, error } = await supabase.from('productos').select('*').order('created_at', { ascending: false });
            
            if (error) return alert("Error al cargar");
            
            adminGrid.innerHTML = '';
            data.forEach(prod => {
                adminGrid.innerHTML += `
                    <article class="product-card">
                        <img src="${prod.image_url}">
                        <p><strong>${prod.nombre}</strong><br>$${Number(prod.precio).toLocaleString()}</p>
                        <button class="btn-danger" onclick="deleteProduct(${prod.id}, '${prod.image_path}')">Eliminar</button>
                    </article>
                `;
            });
        }

        // 4. Subir producto
        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('upload-status');
            
            const file = document.getElementById('prodImage').files[0];
            const nombre = document.getElementById('prodName').value;
            const precio = document.getElementById('prodPrice').value;
            const categoria = document.getElementById('prodCategory').value;

            btn.disabled = true;
            status.style.display = "block";

            // Subir imagen
            const fileName = `${Date.now()}_${file.name}`;
            const { data: storageData, error: storageError } = await supabase.storage
                .from('product-images')
                .upload(fileName, file);

            if (storageError) {
                alert("Error al subir imagen");
                btn.disabled = false;
                return;
            }

            // Obtener URL
            const { data: urlData } = supabase.storage.from('product-images').getPublicUrl(fileName);

            // Guardar en DB
            const { error: dbError } = await supabase.from('productos').insert([{
                nombre, precio, categoria, image_url: urlData.publicUrl, image_path: fileName
            }]);

            if (dbError) alert("Error en base de datos");
            else {
                productForm.reset();
                fetchProducts();
            }

            btn.disabled = false;
            status.style.display = "none";
        });

        // 5. Eliminar
        async function deleteProduct(id, path) {
            if (!confirm("¿Eliminar prenda?")) return;

            const { error: dbError } = await supabase.from('productos').delete().eq('id', id);
            await supabase.storage.from('product-images').remove([path]);

            if (!dbError) fetchProducts();
        }

        checkAuth();
    </script>
</body>
</html>
