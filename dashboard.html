<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Luamy Taller</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <header class="admin-header">
        <nav class="admin-nav">
            <img src="logo2.jpeg" alt="Luamy Logo" style="height: 50px;">
            <button id="btn-logout" class="btn-primary">Cerrar Sesión</button>
        </nav>
    </header>

    <main class="admin-container">
        <section class="admin-content">
            <header>
                <h1>Panel de Control</h1>
            </header>

            <article class="upload-section">
                <h2>Añadir Contenido Dinámico</h2>
            <form id="productForm">
                <select id="uploadType" required>
                    <option value="productos">Productos</option>
                    <option value="gallery">Galería</option>
                    <option value="slider">Slider</option>
                </select>

                <input type="text" id="mainTitle" placeholder="Nombre / Título" required>
                <input type="number" id="prodPrice" placeholder="Precio (Solo producto)">
                <input type="text" id="prodCategory" placeholder="Categoria (galería, producto)">
                <input type="text" id="gallerySubtitle" placeholder="Subtítulo (Solo Galería)">
                <input type="file" id="prodImage" accept="image/*" required>

                <button type="submit" id="uploadBtn">Subir a Supabase</button>
            </form> 
            </article>

            <section class="view-section">
                <h2>Gestión de Items Existentes</h2>
                <div id="admin-grid" class="products-grid"></div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
